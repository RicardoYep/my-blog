<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的博客</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                    <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
                </svg>
                我的博客
            </a>
            <div class="nav-links">
                <a href="#" class="nav-link active" data-view="list">文章列表</a>
                <a href="#" class="nav-link" data-view="about">关于</a>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <!-- 文章列表视图 -->
        <section id="articleList" class="view-section active">
            <div class="articles-header">
                <h2>最新文章</h2>
                <span class="article-count" id="articleCount">0 篇文章</span>
            </div>
            <div class="articles-grid" id="articlesGrid">
                <!-- 文章卡片将通过JS动态生成 -->
            </div>
        </section>

        <!-- 文章详情视图 -->
        <section id="articleDetail" class="view-section">
            <button class="back-btn" onclick="showListView()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                返回列表
            </button>
            <article class="article-content" id="articleContent">
                <!-- 文章内容将通过JS动态填充 -->
            </article>
        </section>

        <!-- 关于视图 -->
        <section id="aboutView" class="view-section">
            <div class="about-card">
                <div class="about-avatar">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </div>
                <h2>关于我</h2>
                <p class="about-text">
                    上海交通大学微电子科学与工程专业学生<br>
                    专注半导体制造与IC设计 | AI辅助开发爱好者
                </p>
                <div class="about-info">
                    <div class="info-item">
                        <span class="info-label">邮箱</span>
                        <span class="info-value" style="font-size: 14px;">yepzhenyuan@sjtu.edu.cn</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">文章数量</span>
                        <span class="info-value" id="aboutArticleCount">0 篇</span>
                    </div>
                </div>
                <a href="index.html" class="btn btn-primary">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7"></rect>
                        <rect x="14" y="3" width="7" height="7"></rect>
                        <rect x="3" y="14" width="7" height="7"></rect>
                        <rect x="14" y="14" width="3" height="3"></rect>
                    </svg>
                    扫码入口
                </a>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>&copy; 2026 我的博客 · 用心记录每一天</p>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
